<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <script src="./mermaid.min.js"></script>
</head>
<body>
<div id="container"></div>

<script>
    var _renderCount = 0;

    window.renderMermaidSync = function (code, theme, config, css) {
        // use a unique id each call to avoid mermaid's internal id conflict
        var id = "graphDiv_" + (++_renderCount);

        var defaultConfig = { startOnLoad: false, theme: theme || "default" };

        var finalConfig = {};
        for (var k in defaultConfig) { if (defaultConfig.hasOwnProperty(k)) finalConfig[k] = defaultConfig[k]; }
        if (config) {
            for (var k in config) { if (config.hasOwnProperty(k)) finalConfig[k] = config[k]; }
        }

        mermaid.initialize(finalConfig);

        // inject optional CSS
        if (css) {
            var style = document.getElementById("mmdc-custom-css") || document.createElement("style");
            style.id = "mmdc-custom-css";
            style.textContent = css;
            document.head.appendChild(style);
        }

        var svg = null;
        var done = false;
        mermaid.render(id, code, function(svgResult) {
            svg = svgResult;
            done = true;
        });

        // busy-wait up to 5s
        var start = Date.now();
        while (!done && Date.now() - start < 5000) {}

        return svg || "";
    };
</script>
</body>
</html>
