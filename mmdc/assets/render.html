<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <script src="./mermaid.min.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html, body { overflow: hidden; }
    </style>
</head>
<body>
<div id="container"></div>

<script>
    var _renderCount = 0;

    function _mergeConfig(theme, config) {
        var base = { startOnLoad: false, theme: theme || "default" };
        if (config) {
            for (var k in config) {
                if (config.hasOwnProperty(k)) base[k] = config[k];
            }
        }
        return base;
    }

    function _injectCss(css) {
        if (!css) return;
        var el = document.getElementById("mmdc-css") || document.createElement("style");
        el.id = "mmdc-css";
        el.textContent = css;
        document.head.appendChild(el);
    }

    function _doRender(code, theme, config, css) {
        var id = "gd" + (++_renderCount);
        mermaid.initialize(_mergeConfig(theme, config));
        _injectCss(css);
        var svg = null, done = false, errMsg = null;
        try {
            mermaid.render(id, code, function(s) { svg = s; done = true; });
        } catch(e) {
            errMsg = e.message || String(e);
            done = true;
        }
        var t = Date.now();
        while (!done && Date.now() - t < 5000) {}
        if (!svg) return { error: errMsg || "render timed out or returned empty" };
        return { svg: svg };
    }

    function _viewBoxDims(svg) {
        // try viewBox first
        var m = svg.match(/viewBox=["']([^"']+)["']/);
        if (m) {
            var p = m[1].trim().split(/\s+/);
            if (p.length === 4) {
                var w = parseFloat(p[2]), h = parseFloat(p[3]);
                if (w > 0 && h > 0) return { w: w, h: h };
            }
        }
        // fallback: width/height attributes
        var wm = svg.match(/\s+width=["']([^"']+)["']/);
        var hm = svg.match(/\s+height=["']([^"']+)["']/);
        if (wm && hm) {
            var w = parseFloat(wm[1]), h = parseFloat(hm[1]);
            if (w > 0 && h > 0) return { w: w, h: h };
        }
        return null;
    }

    // ── API 1: return SVG string or null on error (to_svg) ───────────────────
    window.renderMermaidSync = function(code, theme, config, css) {
        var r = _doRender(code, theme, config, css);
        return r.svg || null;
    };

    window.renderMermaidError = function(code, theme, config, css) {
        var r = _doRender(code, theme, config, css);
        return r.error || null;
    };

    // ── API 2: inject into page, resize html/body, return {width, height} ─────
    window.renderMermaidToPage = function(code, theme, config, css, background, scale) {
        scale      = scale      || 1.0;
        background = background || "white";

        var r = _doRender(code, theme, config, css);
        if (!r.svg) return { error: r.error || "render failed" };

        var dims = _viewBoxDims(r.svg);
        if (!dims) return { error: "could not determine SVG dimensions" };

        var w = Math.round(dims.w * scale);
        var h = Math.round(dims.h * scale);

        // set explicit pixel size on SVG (keep viewBox for quality)
        var sized = r.svg
            .replace(/\s*width=["'][^"']*["']/g,  "")
            .replace(/\s*height=["'][^"']*["']/g, "")
            .replace("<svg", '<svg width="' + w + '" height="' + h + '"');

        // resize html/body to exact diagram size — zero whitespace
        document.documentElement.style.cssText =
            "width:" + w + "px;height:" + h + "px;overflow:hidden;";
        document.body.style.cssText =
            "width:" + w + "px;height:" + h + "px;overflow:hidden;background:" + background + ";";

        document.getElementById("container").innerHTML = sized;

        return { width: w, height: h };
    };
</script>
</body>
</html>
