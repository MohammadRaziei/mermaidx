<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <script src="./mermaid.min.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html, body { overflow: hidden; }
        #container { line-height: 0; }
        #container svg { display: block; }
    </style>
</head>
<body>
<div id="container"></div>

<script>
    var _renderCount = 0;

    // ── internal ──────────────────────────────────────────────────────────────
    function _mergeConfig(theme, config) {
        var base = { startOnLoad: false, theme: theme || "default" };
        if (config) {
            for (var k in config) {
                if (config.hasOwnProperty(k)) base[k] = config[k];
            }
        }
        return base;
    }

    function _injectCss(css) {
        if (!css) return;
        var style = document.getElementById("mmdc-custom-css")
                    || document.createElement("style");
        style.id = "mmdc-custom-css";
        style.textContent = css;
        document.head.appendChild(style);
    }

    function _renderToSvg(code, theme, config, css) {
        var id = "graphDiv_" + (++_renderCount);
        mermaid.initialize(_mergeConfig(theme, config));
        _injectCss(css);

        var svg = null, done = false;
        mermaid.render(id, code, function(s) { svg = s; done = true; });

        var t = Date.now();
        while (!done && Date.now() - t < 5000) {}
        return svg || "";
    }

    function _viewBoxDims(svg) {
        var m = svg.match(/viewBox=["']([^"']+)["']/);
        if (!m) return null;
        var p = m[1].trim().split(/\s+/);
        if (p.length !== 4) return null;
        return { w: parseFloat(p[2]), h: parseFloat(p[3]) };
    }

    // ── API 1: SVG string (to_svg) ────────────────────────────────────────────
    window.renderMermaidSync = function(code, theme, config, css) {
        return _renderToSvg(code, theme, config, css);
    };

    // ── API 2: inject into DOM (to_png / to_pdf) ──────────────────────────────
    // Clears the container, renders fresh, injects SVG with pixel dimensions,
    // sizes html/body to match so there is zero whitespace around the diagram.
    // Returns { width, height } for Python to set the viewport before screenshot.
    window.renderMermaidToPage = function(code, theme, config, css, background, scale) {
        scale      = scale      || 1.0;
        background = background || "white";

        // clear previous render so mermaid doesn't conflict
        var container = document.getElementById("container");
        container.innerHTML = "";

        var svg = _renderToSvg(code, theme, config, css);
        if (!svg) return null;

        var dims = _viewBoxDims(svg);
        if (!dims) return null;

        var w = Math.round(dims.w * scale);
        var h = Math.round(dims.h * scale);

        // set explicit pixel size on the SVG element
        var sized = svg
            .replace(/\s*width=["'][^"']*["']/, "")
            .replace(/\s*height=["'][^"']*["']/, "")
            .replace("<svg", '<svg width="' + w + '" height="' + h + '"');

        // size html/body to exactly the diagram so no whitespace in screenshot
        document.documentElement.style.width  = w + "px";
        document.documentElement.style.height = h + "px";
        document.body.style.width             = w + "px";
        document.body.style.height            = h + "px";
        document.body.style.background        = background;

        container.innerHTML = sized;
        return { width: w, height: h };
    };
</script>
</body>
</html>
