<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <script src="./mermaid.min.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #container {
            display: inline-block;
            line-height: 0;
            width: 100%; height: 100%; 
            align-items: center;
        }
        #container svg {
            display: block;
            width: 100% !important;
            height: 100% !important;
            align-items: center;
        }
    </style>
</head>
<body>
<div id="container"></div>

<script>
    var _renderCount = 0;

    function _mergeConfig(theme, config) {
        var base = { startOnLoad: false, theme: theme || "default" };
        if (config) {
            for (var k in config) {
                if (config.hasOwnProperty(k)) base[k] = config[k];
            }
        }
        return base;
    }

    function _injectCss(css) {
        if (!css) return;
        var el = document.getElementById("mmdc-css") || document.createElement("style");
        el.id = "mmdc-css";
        el.textContent = css;
        document.head.appendChild(el);
    }

    function _doRender(code, theme, config, css) {
        var id = "gd" + (++_renderCount);
        mermaid.initialize(_mergeConfig(theme, config));
        _injectCss(css);
        var result = null, done = false;
        try {
            mermaid.render(id, code, function(svg) {
                result = { svg: svg };
                done = true;
            });
        } catch(e) {
            result = { error: e.message || String(e) };
            done = true;
        }
        var t = Date.now();
        while (!done && Date.now() - t < 5000) {}
        return result || { error: "render timed out" };
    }

    function _naturalDims(svg) {
        // try viewBox first
        var m = svg.match(/viewBox=["']([^"']+)["']/);
        if (m) {
            var p = m[1].trim().split(/\s+/);
            if (p.length === 4) {
                var w = parseFloat(p[2]), h = parseFloat(p[3]);
                if (w > 0 && h > 0) return { w: w, h: h };
            }
        }
        // fallback to width/height attributes
        var wm = svg.match(/\s+width=["']([0-9.]+)/);
        var hm = svg.match(/\s+height=["']([0-9.]+)/);
        if (wm && hm) {
            var w = parseFloat(wm[1]), h = parseFloat(hm[1]);
            if (w > 0 && h > 0) return { w: w, h: h };
        }
        return null;
    }

    // ── API 1: SVG string (to_svg) ────────────────────────────────────────────
    window.renderMermaidSync = function(code, theme, config, css) {
        var r = _doRender(code, theme, config, css);
        return r.svg || null;
    };

    window.renderMermaidError = function(code, theme, config, css) {
        var r = _doRender(code, theme, config, css);
        return r.error || null;
    };

    // ── API 2: inject into page (to_png / to_pdf) ─────────────────────────────
    // Does NOT touch the SVG markup at all.
    // Sets container size via CSS, injects SVG as-is, SVG fills via CSS.
    // Returns { width, height } so Python can set viewport once.
    window.renderMermaidToPage = function(code, theme, config, css, background, scale) {
        scale      = scale      || 1.0;
        background = background || "white";

        var r = _doRender(code, theme, config, css);
        if (!r.svg) return { error: r.error || "render failed" };

        var dims = _naturalDims(r.svg);
        if (!dims) return { error: "could not read SVG dimensions" };

        var w = Math.round(dims.w * scale);
        var h = Math.round(dims.h * scale);

        // size the container to exactly w×h — SVG fills it via CSS
        var c = document.getElementById("container");
        c.style.width  = w + "px";
        c.style.height = h + "px";

        // size html/body to the same — no whitespace around the diagram
        document.documentElement.style.cssText =
            "width:" + w + "px;height:" + h + "px;overflow:hidden;";
        document.body.style.cssText =
            "width:" + w + "px;height:" + h + "px;overflow:hidden;background:" + background + ";";

        // inject SVG completely untouched
        c.innerHTML = r.svg;

        return { width: w, height: h };
    };
</script>
</body>
</html>
